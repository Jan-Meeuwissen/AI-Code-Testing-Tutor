<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Code Testing Tutor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── CSS Variables ─────────────────────────────────────────── */
    :root {
      --bg:           #3f2e56;
      --bg-light:     #4e3a68;
      --bg-lighter:   #5a4475;
      --accent:       #98d3eb;
      --accent-dim:   rgba(152, 211, 235, 0.15);
      --accent-border:rgba(152, 211, 235, 0.35);
      --text:         #b0b0d8;
      --text-bright:  #d4d4ee;
      --text-muted:   #7878a8;
      --gold:         #eead29;
      --sidebar-w:    220px;
      --header-h:     0px;
      --radius:       10px;
    }

    /* ── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Roboto', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Layout ────────────────────────────────────────────────── */
    .app {
      display: flex;
      height: 100vh;
    }

    /* ── Sidebar ───────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: rgba(0,0,0,0.2);
      border-right: 1px solid var(--accent-border);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 24px 18px 24px 18px;
      gap: 0;
    }

    .sidebar-logo {
      width: 150px;
      height: auto;
      display: block;
      margin-bottom: 16px;
    }

    .sidebar-user {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      color: var(--gold);
      font-size: 0.82rem;
      line-height: 1.6;
      letter-spacing: 0.02em;
      border-top: 1px solid var(--accent-border);
      padding-top: 14px;
      width: 100%;
      word-break: break-word;
    }

    .sidebar-user .label {
      font-size: 0.68rem;
      color: var(--text-muted);
      font-family: 'Roboto', sans-serif;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 2px;
    }

    .sidebar-user .value {
      color: var(--gold);
      margin-bottom: 10px;
    }

    .sidebar-divider {
      flex: 1;
    }

    .sidebar-footer {
      font-size: 0.7rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* ── Main chat area ────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 18px 28px;
      border-bottom: 1px solid var(--accent-border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(0,0,0,0.1);
    }

    .chat-header h1 {
      font-family: 'Roboto', sans-serif;
      font-weight: 500;
      font-size: 1.05rem;
      color: var(--accent);
      letter-spacing: 0.04em;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Messages ──────────────────────────────────────────────── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 28px 12px 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb {
      background: var(--accent-border);
      border-radius: 3px;
    }
    .messages::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 82%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user  { align-self: flex-end; align-items: flex-end; }
    .message.agent { align-self: flex-start; align-items: flex-start; }

    .message-role {
      font-size: 0.68rem;
      color: var(--text-muted);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .message-bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 0.92rem;
      line-height: 1.65;
      word-break: break-word;
    }

    .message.user .message-bubble {
      background: var(--accent);
      color: #1a1030;
      border-bottom-right-radius: 3px;
      font-weight: 500;
    }

    .message.agent .message-bubble {
      background: var(--bg-light);
      color: var(--text-bright);
      border-bottom-left-radius: 3px;
      border: 1px solid var(--accent-border);
    }


    /* ── Code blocks ───────────────────────────────────────────── */
    .message-bubble {
      white-space: normal;
    }

    .code-block-wrapper {
      position: relative;
      margin: 8px 0;
    }


    .copy-btn {
      position: absolute;
      top: 6px;
      right: 10px;
      background: transparent;
      border: 1px solid var(--accent-border);
      border-radius: 4px;
      color: var(--text-muted);
      font-family: 'Roboto', sans-serif;
      font-size: 0.68rem;
      padding: 2px 8px;
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
      outline: none;
      z-index: 1;
    }

    .copy-btn:hover {
      background: rgba(255,255,255,0.1);
      color: var(--accent);
    }

    .code-lang-label {

      position: absolute;
      top: 6px;
      right: 68px;
      font-size: 0.68rem;
      color: var(--text-muted);
      font-family: 'Roboto', sans-serif;
      text-transform: lowercase;
      letter-spacing: 0.05em;
      pointer-events: none;
    }

    .message-bubble pre {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(0,0,0,0.3);
      border-radius: 6px;
      padding: 12px 16px;
      overflow-x: auto;
      margin: 0;
    }

    .message-bubble pre code {
      font-family: 'Courier New', Consolas, monospace;
      font-size: 0.85rem;
      color: var(--text-bright);
      background: none;
      padding: 0;
      border-radius: 0;
      white-space: pre;
    }

    .message-bubble code {
      font-family: 'Courier New', Consolas, monospace;
      font-size: 0.88em;
      background: rgba(0,0,0,0.25);
      color: var(--text-bright);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .message-bubble p {
      margin-bottom: 6px;
    }

    .message-bubble p:last-child {
      margin-bottom: 0;
    }


    .user-copy-btn {
      background: transparent;
      border: 1px solid var(--text-muted);
      border-radius: 4px;
      color: var(--text-muted);
      font-family: 'Roboto', sans-serif;
      font-size: 0.65rem;
      padding: 2px 8px;
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
      outline: none;
      align-self: flex-end;
      margin-top: 4px;
    }

    .user-copy-btn:hover {
      background: rgba(120, 120, 168, 0.15);
      color: var(--text-bright);
    }

    /* ── Loading indicator ─────────────────────────────────────── */
    .loading {
      display: none;
      align-self: flex-start;
      padding: 12px 18px;
      background: var(--bg-light);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius);
      border-bottom-left-radius: 3px;
    }

    .loading.visible { display: flex; gap: 5px; align-items: center; }

    .loading span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s infinite;
    }
    .loading span:nth-child(2) { animation-delay: 0.2s; }
    .loading span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Input area ────────────────────────────────────────────── */
    .input-area {
      padding: 16px 28px 20px 28px;
      border-top: 1px solid var(--accent-border);
      background: rgba(0,0,0,0.1);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-area textarea {
      flex: 1;
      resize: none;
      background: var(--bg-light);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius);
      color: var(--text-bright);
      font-family: 'Roboto', sans-serif;
      font-size: 0.92rem;
      padding: 11px 14px;
      outline: none;
      min-height: 46px;
      max-height: 160px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    .input-area textarea::placeholder { color: var(--text-muted); }

    .input-area textarea:focus {
      border-color: var(--accent);
      background: var(--bg-lighter);
    }

    .input-area textarea::-webkit-scrollbar { width: 4px; }
    .input-area textarea::-webkit-scrollbar-thumb { background: var(--accent-border); border-radius: 2px; }

    .send-btn {
      background: var(--accent);
      color: #1a1030;
      border: none;
      border-radius: var(--radius);
      padding: 11px 20px;
      font-family: 'Roboto', sans-serif;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
      height: 46px;
    }

    .send-btn:hover { background: #b8e3f5; }
    .send-btn:active { transform: scale(0.97); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Modal overlay ─────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(30, 18, 45, 0.92);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-overlay.hidden { display: none; }

    .modal {
      background: var(--bg-light);
      border: 1px solid var(--accent-border);
      border-radius: 14px;
      padding: 40px 36px 36px 36px;
      width: 380px;
      max-width: 95vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .modal-logo {
      width: 130px;
      margin: 0 auto 4px auto;
      display: block;
    }

    .modal h2 {
      font-family: 'Roboto', sans-serif;
      font-weight: 500;
      font-size: 1rem;
      color: var(--accent);
      text-align: center;
      letter-spacing: 0.04em;
    }

    .modal-subtitle {
      font-size: 0.82rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: -16px;
    }

    .modal-fields {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal-field label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .modal-field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--accent-border);
      border-radius: 8px;
      color: var(--text-bright);
      font-family: 'Roboto', sans-serif;
      font-size: 0.95rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .modal-field input:focus { border-color: var(--accent); }
    .modal-field input::placeholder { color: var(--text-muted); }

    .modal-error {
      font-size: 0.78rem;
      color: #f87171;
      min-height: 18px;
      text-align: center;
    }

    .modal-confirm {
      background: var(--accent);
      color: #1a1030;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-family: 'Roboto', sans-serif;
      font-weight: 500;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.03em;
    }

    .modal-confirm:hover { background: #b8e3f5; }
    .modal-confirm:active { transform: scale(0.98); }
  </style>
</head>

      <div class="sidebar-user" id="sidebarUser" style="display:none;">
        <div class="label">Studentnummer</div>
        <div class="value" id="displayStudentnr"></div>
        <div class="label">Naam</div>
        <div class="value" id="displayNaam"></div>
      </div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-footer">
        Model<br><strong style="color:var(--text);">qwen2.5-coder<br>1.5b-instruct</strong>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <div class="chat-header">
        <div class="status-dot"></div>
        <h1>AI Code Testing Tutor</h1>
      </div>

      <div class="messages" id="messages">
      </div>

      <div class="loading" id="loading">
        <span></span><span></span><span></span>
      </div>

      <div class="input-area">
        <textarea
          id="userInput"
          placeholder="Stel een vraag over software testing..."
          rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn">Verstuur</button>
      </div>
    </main>

  </div>

  <script>
    // ── Copy code to clipboard ───────────────────────────────────────────
    const codeStore = new Map();
    let codeStoreId = 0;

    function copyCode(btn, id) {
      const code = codeStore.get(id) || '';
      navigator.clipboard.writeText(code).then(function() {
        btn.textContent = 'copied!';
        btn.style.color = 'var(--accent)';
        setTimeout(function() {
          btn.textContent = 'copy';
          btn.style.color = '';
        }, 2000);
      }).catch(function() {
        btn.textContent = 'error';
        setTimeout(function() { btn.textContent = 'copy'; }, 2000);
      });
    }


    function copyUserMessage(btn) {
      const text = btn.dataset.text || '';
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = 'copied!';
        setTimeout(function() {
          btn.textContent = 'copy';
        }, 2000);
      }).catch(function() {
        btn.textContent = 'error';
        setTimeout(function() { btn.textContent = 'copy'; }, 2000);
      });
    }

    // ── HTML escape (veiligheid) ──────────────────────────────────────
    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── Inline code parser ──────────────────────────────────────────────
    function parseInline(text) {
      const TICK = String.fromCharCode(96);
      let result = "";
      let remaining = text;
      while (remaining.length > 0) {
        const tickIdx = remaining.indexOf(TICK);
        if (tickIdx === -1) {
          result += escapeHtml(remaining).replace(/\n/g, "<br>");
          break;
        }
        if (tickIdx > 0) {
          result += escapeHtml(remaining.slice(0, tickIdx)).replace(/\n/g, "<br>");
        }
        const closeIdx = remaining.indexOf(TICK, tickIdx + 1);
        if (closeIdx === -1) {
          result += escapeHtml(remaining.slice(tickIdx)).replace(/\n/g, "<br>");
          break;
        }
        const inlineCode = remaining.slice(tickIdx + 1, closeIdx);
        result += "<code>" + escapeHtml(inlineCode) + "</code>";
        remaining = remaining.slice(closeIdx + 1);
      }
      return result.trim() ? "<p>" + result + "</p>" : result;
    }

    // ── Message parser (codeblokken + inline code) ───────────────────
    function parseMessage(text) {
      try {
        const TRIPLE = String.fromCharCode(96,96,96);
        let html = "";
        let remaining = text;
        while (remaining.length > 0) {
          const tripleIdx = remaining.indexOf(TRIPLE);
          if (tripleIdx === -1) {
            html += parseInline(remaining);
            break;
          }
          if (tripleIdx > 0) {
            html += parseInline(remaining.slice(0, tripleIdx));
          }
          const closeIdx = remaining.indexOf(TRIPLE, tripleIdx + 3);
          if (closeIdx === -1) {
            html += parseInline(remaining.slice(tripleIdx));
            break;
          }
          const inner = remaining.slice(tripleIdx + 3, closeIdx);
          const nlIdx = inner.indexOf(String.fromCharCode(10));
          const lang = nlIdx !== -1 ? inner.slice(0, nlIdx) : "";
          const code = nlIdx !== -1 ? inner.slice(nlIdx + 1) : inner;
          const labelHtml = lang.trim() ? "<span class=\"code-lang-label\">" + escapeHtml(lang.trim()) + "</span>" : "";
          const storeId = codeStoreId++;
          codeStore.set(storeId, code);
          const copyBtn = "<button class=\"copy-btn\" onclick=\"copyCode(this, " + storeId + ")\" >copy</button>";
          html += "<div class=\"code-block-wrapper\">" + copyBtn + labelHtml + "<pre><code>" + escapeHtml(code) + "</code></pre></div>";
          remaining = remaining.slice(closeIdx + 3);
        }
        return html;
      } catch(e) {
        return escapeHtml(text);
      }
    }
    // ── User identification ──────────────────────────────────────
    const overlay      = document.getElementById('modalOverlay');
    const inputNr      = document.getElementById('inputStudentnr');
    const inputNaam    = document.getElementById('inputNaam');
    const modalError   = document.getElementById('modalError');
    const modalConfirm = document.getElementById('modalConfirm');
    const sidebarUser  = document.getElementById('sidebarUser');
    const displayNr    = document.getElementById('displayStudentnr');
    const displayNaam  = document.getElementById('displayNaam');

    function applyUser(nr, naam) {
      displayNr.textContent   = nr;
      displayNaam.textContent = naam;
      sidebarUser.style.display = 'block';
      overlay.classList.add('hidden');
      document.getElementById('userInput').focus();
    }

    // Restore from sessionStorage if present
    const savedNr   = sessionStorage.getItem('studentnr');
    const savedNaam = sessionStorage.getItem('naam');
    if (savedNr && savedNaam) {
      applyUser(savedNr, savedNaam);
      document.getElementById('userInput').focus();
    }

    modalConfirm.addEventListener('click', () => {
      const nr   = inputNr.value.trim();
      const naam = inputNaam.value.trim();
      modalError.textContent = '';

      if (!nr || !naam) {
        modalError.textContent = 'Vul beide velden in.';
        return;
      }
      if (!/^\d+$/.test(nr)) {
        modalError.textContent = 'Studentnummer mag alleen cijfers bevatten.';
        return;
      }

      sessionStorage.setItem('studentnr', nr);
      sessionStorage.setItem('naam', naam);
      applyUser(nr, naam);
    });

    // Prevent closing modal via Escape
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') e.preventDefault();
    });

    // ── Chat logic ───────────────────────────────────────────────
    const messagesEl = document.getElementById('messages');
    const userInput  = document.getElementById('userInput');
    const sendBtn    = document.getElementById('sendBtn');
    const loadingEl  = document.getElementById('loading');

    let chatHistory = [];
    let isLoading   = false;

    // Welkomstbericht via addMessage zodat parseMessage beschikbaar is
    addMessage('agent', 'Hello! I am AI Code Testing Tutor. Ask me about test cases, test strategy, test automation or code quality.');


    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addMessage(role, content) {
      const wrapper = document.createElement('div');
      wrapper.className = `message ${role === 'user' ? 'user' : 'agent'}`;

      const label = document.createElement('div');
      label.className = 'message-role';
      label.textContent = role === 'user' ? 'Jij' : 'Agent';

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      if (role === 'user') {
        bubble.textContent = content;
      } else {
        try {
          bubble.innerHTML = parseMessage(content);
        } catch(e) {
          bubble.textContent = content;
        }
      }

      wrapper.appendChild(label);
      wrapper.appendChild(bubble);

      // Copy button for user messages
      if (role === 'user') {
        const copyBtn = document.createElement('button');
        copyBtn.className = 'user-copy-btn';
        copyBtn.textContent = 'copy';
        copyBtn.dataset.text = content;
        copyBtn.setAttribute('onclick', 'copyUserMessage(this)');
        wrapper.appendChild(copyBtn);
      }

      messagesEl.appendChild(wrapper);
      scrollToBottom();
      return bubble;
    }

    // Auto-resize textarea
    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 160) + 'px';
    });

    // Send on Enter (Shift+Enter for newline)
    userInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!isLoading) sendMessage();
      }
    });

    sendBtn.addEventListener('click', () => { if (!isLoading) sendMessage(); });

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      userInput.value = '';
      userInput.style.height = 'auto';
      isLoading = true;
      sendBtn.disabled = true;

      addMessage('user', text);
      chatHistory.push({ role: 'user', content: text });

      // Show loading
      messagesEl.appendChild(loadingEl);
      loadingEl.classList.add('visible');
      scrollToBottom();

      // Create agent bubble (hidden until first token)
      const agentBubble = addMessage('agent', '');
      agentBubble.textContent = '';

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: chatHistory })
        });

        loadingEl.classList.remove('visible');

        if (!res.ok) throw new Error(`Server error: ${res.status}`);

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let fullResponse = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value, { stream: true });
          const lines = chunk.split('\n').filter(l => l.startsWith('data: '));

          for (const line of lines) {
            const data = line.slice(6);
            if (data === '[DONE]') break;
            try {
              const parsed = JSON.parse(data);
              const token  = parsed.token || '';
              fullResponse += token;
              try {
                agentBubble.innerHTML = parseMessage(fullResponse);
              } catch(e) {
                agentBubble.textContent = fullResponse;
              }
              scrollToBottom();
            } catch {}
          }
        }

        chatHistory.push({ role: 'assistant', content: fullResponse });

      } catch (err) {
        loadingEl.classList.remove('visible');
        agentBubble.textContent = 'Fout: ' + err.message;
      }

      isLoading = false;
      sendBtn.disabled = false;
      userInput.focus();
    }
  </script>
